version: '3.8'

services:
  presenca-service:
    build: .
    container_name: presenca-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/presenca_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - presenca-network

  postgres:
    image: postgres:15
    container_name: presenca-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=presenca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - presenca-network

volumes:
  postgres_data:

networks:
  presenca-network:
    driver: bridge
