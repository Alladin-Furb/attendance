version: '3.8'

services:
  presenca-service:
    build: .
    container_name: presenca-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/presenca_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=admin123
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - presenca-network

  postgres:
    image: postgres:15
    container_name: presenca-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=presenca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - presenca-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: presenca-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - presenca-network

volumes:
  postgres_data:

networks:
  presenca-network:
    driver: bridge